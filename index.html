document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Bolo 20K seguidores<\u002Ftitle>\n<script src=\"a6b67915-faad-4dc2-ae3a-aeab04b38d0d\"><\u002Fscript>\n<script src=\"ae64c62e-ca63-440b-aa84-e1c57f8d6b41\"><\u002Fscript>\n<style>\n  :root{\n    --cream:#FEF6E4;\n    --cream-2:#FBEAD2;\n    --pink:#F582AE;\n    --pink-soft:#FBC7DD;\n    --pink-deep:#EE5A98;\n    --blue:#001858;\n    --white:#FFFFFF;\n    --flame-1:#FFE8A3;\n    --flame-2:#FFC93C;\n    --flame-3:#FF7A1A;\n  }\n\n  *{ box-sizing:border-box; margin:0; padding:0; }\n\n  html,body{ height:100%; }\n  body{\n    background:#0b0b10;\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;\n    overflow:hidden;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ---------- Stage / scaling ---------- */\n  #stage{\n    position:fixed; inset:0;\n    display:grid; place-items:center;\n    background:\n      radial-gradient(120% 80% at 50% -10%, #16161f 0%, #0b0b10 60%);\n  }\n  #canvas{\n    position:relative;\n    width:1080px; height:1920px;\n    transform-origin:center center;\n    background:\n      radial-gradient(70% 45% at 18% 8%, var(--cream-2) 0%, transparent 55%),\n      radial-gradient(60% 40% at 88% 92%, #FCE5EE 0%, transparent 55%),\n      var(--cream);\n    overflow:hidden;\n    box-shadow:0 40px 120px rgba(0,0,0,.5);\n  }\n\n  /* soft decorative blobs */\n  .blob{ position:absolute; border-radius:50%; filter:blur(2px); opacity:.5; pointer-events:none; }\n  .blob.b1{ width:340px; height:340px; background:radial-gradient(circle at 35% 35%, #FCD7E6, transparent 70%); top:120px; left:-90px; }\n  .blob.b2{ width:300px; height:300px; background:radial-gradient(circle at 35% 35%, #FBE8C9, transparent 70%); top:1480px; right:-80px; }\n  .blob.b3{ width:220px; height:220px; background:radial-gradient(circle at 35% 35%, #D9E0FF, transparent 70%); top:60px; right:60px; }\n\n  /* faint background hearts */\n  .bg-hearts{ position:absolute; inset:0; pointer-events:none; }\n  .bg-hearts .h{ position:absolute; color:var(--pink-soft); opacity:.45; }\n\n  /* ---------- Header copy ---------- */\n  .kicker{\n    position:absolute; top:120px; left:0; right:0; text-align:center;\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-size:46px; font-weight:600; letter-spacing:.5px;\n    color:var(--pink-deep);\n  }\n  .headline{\n    position:absolute; top:178px; left:0; right:0; text-align:center;\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-weight:700; letter-spacing:-2px;\n    font-size:128px; line-height:.98; color:var(--blue);\n  }\n  .headline small{ display:block; font-size:54px; font-style:italic; color:var(--pink-deep); margin-top:6px; letter-spacing:1px; }\n\n  /* ---------- Cake ---------- */\n  #cakeWrap{\n    position:absolute; left:50%; top:720px;\n    transform:translateX(-50%);\n    width:760px; height:760px;\n    transition:transform .12s ease;\n    transform-origin:50% 70%;\n  }\n  #cakeWrap.shake{ animation:shake .5s ease; }\n  @keyframes shake{\n    0%,100%{ transform:translateX(-50%) rotate(0); }\n    20%{ transform:translateX(calc(-50% - 10px)) rotate(-1.2deg); }\n    45%{ transform:translateX(calc(-50% + 9px)) rotate(1deg); }\n    70%{ transform:translateX(calc(-50% - 6px)) rotate(-.6deg); }\n  }\n\n  /* plate */\n  .plate{\n    position:absolute; left:50%; bottom:40px; transform:translateX(-50%);\n    width:720px; height:120px; border-radius:50%;\n    background:linear-gradient(#ffffff, #F3ECF7);\n    box-shadow:0 26px 50px rgba(0,24,88,.14), inset 0 -6px 14px rgba(0,24,88,.06);\n  }\n  .plate::after{\n    content:\"\"; position:absolute; left:50%; top:18px; transform:translateX(-50%);\n    width:560px; height:70px; border-radius:50%;\n    background:#fff;\n    box-shadow:inset 0 4px 10px rgba(0,24,88,.06);\n  }\n\n  /* cake body */\n  .cake-body{\n    position:absolute; left:50%; bottom:96px; transform:translateX(-50%);\n    width:520px; height:300px;\n    background:linear-gradient(#ffffff 0%, #FFFDFE 55%, #FCEFF5 100%);\n    border-radius:34px 34px 40px 40px / 26px 26px 60px 60px;\n    box-shadow:0 30px 60px rgba(0,24,88,.12), inset 0 -22px 34px rgba(238,90,152,.10);\n  }\n  /* top frosting surface */\n  .cake-top{\n    position:absolute; left:50%; top:-44px; transform:translateX(-50%);\n    width:520px; height:120px; border-radius:50%;\n    background:linear-gradient(#ffffff, #FFF6FB);\n    box-shadow:0 8px 0 #fff, inset 0 6px 14px rgba(255,255,255,.9), inset 0 -10px 18px rgba(238,90,152,.12);\n  }\n  .cake-top::after{ /* subtle pink rim */\n    content:\"\"; position:absolute; inset:8px; border-radius:50%;\n    box-shadow:inset 0 0 0 3px rgba(245,130,174,.18);\n  }\n\n  /* hearts on top of cake */\n  .top-hearts{ position:absolute; left:0; top:-30px; width:520px; height:90px; }\n  .top-hearts svg{ position:absolute; filter:drop-shadow(0 2px 2px rgba(238,90,152,.25)); }\n\n  /* icing handwritten text on the cake side */\n  .icing{\n    position:absolute; left:0; right:0; bottom:150px; text-align:center;\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:700;\n    color:var(--blue); font-size:62px; line-height:1; letter-spacing:.5px;\n    transform:rotate(-2deg);\n    text-shadow:0 2px 0 rgba(255,255,255,.7), 0 1px 1px rgba(0,24,88,.15);\n  }\n  .icing .small{ display:block; font-size:40px; font-weight:600; color:var(--pink-deep); transform:rotate(1deg); margin-top:2px; }\n\n  /* candles */\n  .candles{\n    position:absolute; left:50%; top:206px; transform:translateX(-50%);\n    display:flex; gap:30px; align-items:flex-end;\n    z-index:3;\n  }\n  .candle{ position:relative; width:130px; height:200px; }\n  .candle svg{ position:absolute; inset:0; width:100%; height:100%; }\n  .wick{\n    position:absolute; width:5px; height:16px; border-radius:3px;\n    background:#5a4632; left:50%; top:-2px; transform:translateX(-50%);\n  }\n  .candle.c2 .wick{ top:6px; }\n  .candle.c0 .wick{ top:2px; }\n\n  /* flame */\n  .flame{\n    position:absolute; left:50%; top:-46px; transform:translateX(-50%);\n    width:36px; height:58px; transform-origin:50% 100%;\n    opacity:1;\n    /* only transform animates on light-up; opacity is instant so a lit flame can never get stuck hidden */\n    transition:transform .25s ease;\n  }\n  .flame .body{\n    position:absolute; inset:0;\n    background:linear-gradient(to top, var(--flame-3) 0%, var(--flame-2) 45%, var(--flame-1) 100%);\n    border-radius:50% 50% 50% 50% / 72% 72% 36% 36%;\n    box-shadow:0 0 34px 10px rgba(255,176,64,.55), 0 0 70px 22px rgba(255,140,40,.28);\n    animation:flicker 1.6s ease-in-out infinite;\n  }\n  .flame .core{\n    position:absolute; left:50%; bottom:6px; transform:translateX(-50%);\n    width:16px; height:30px;\n    background:linear-gradient(to top, #FFB54A, #FFF4C2);\n    border-radius:50% 50% 50% 50% / 70% 70% 40% 40%;\n    filter:blur(.4px);\n    animation:flicker 1.1s ease-in-out infinite reverse;\n  }\n  @keyframes flicker{\n    0%,100%{ transform:translateX(-50%) scale(1,1) skewX(0deg); }\n    25%{ transform:translateX(-52%) scale(.96,1.05) skewX(-3deg); }\n    55%{ transform:translateX(-48%) scale(1.05,.97) skewX(3deg); }\n    80%{ transform:translateX(-51%) scale(.98,1.03) skewX(-2deg); }\n  }\n  .flame.weak .body{ opacity:.7; box-shadow:0 0 18px 5px rgba(255,176,64,.4); }\n  .flame.weak{ transform:translateX(-50%) scale(.7); }\n  /* puff-out: fade + shrink, opacity transitions only in the OUT direction */\n  .flame.out{ opacity:0; transform:translateX(-50%) scale(.2) translateY(8px); transition:opacity .35s ease, transform .35s ease; }\n\n  .smoke{\n    position:absolute; left:50%; top:-40px; transform:translateX(-50%);\n    width:14px; height:14px; border-radius:50%;\n    background:rgba(120,120,130,.5); pointer-events:none;\n    animation:smoke 1.4s ease-out forwards;\n  }\n  @keyframes smoke{\n    0%{ opacity:0; transform:translate(-50%,0) scale(.4); }\n    20%{ opacity:.55; }\n    100%{ opacity:0; transform:translate(-50%,-90px) scale(2.2); filter:blur(6px); }\n  }\n\n  /* ---------- Bottom HUD ---------- */\n  .hud{\n    position:absolute; left:0; right:0; bottom:150px; text-align:center;\n    padding:0 90px;\n  }\n  .instruction{\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:600;\n    font-size:50px; color:var(--blue);\n    margin-bottom:26px; line-height:1.1;\n  }\n  .instruction .pink{ color:var(--pink-deep); }\n\n  .btn{\n    display:inline-flex; align-items:center; gap:16px;\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:40px;\n    color:#fff; background:var(--blue);\n    border:none; border-radius:999px;\n    padding:22px 44px; cursor:pointer;\n    box-shadow:0 16px 30px rgba(0,24,88,.28);\n    transition:transform .15s ease, box-shadow .15s ease, background .2s;\n  }\n  .btn:hover{ transform:translateY(-3px); box-shadow:0 22px 40px rgba(0,24,88,.34); }\n  .btn:active{ transform:translateY(0); }\n  .btn.ghost{ background:transparent; color:var(--pink-deep); box-shadow:none; font-size:32px; padding:12px 20px; }\n  .btn.ghost:hover{ transform:none; text-decoration:underline; }\n\n  /* mic meter */\n  .mic-row{ display:flex; flex-direction:column; align-items:center; gap:18px; }\n  .meter{\n    width:380px; height:18px; border-radius:999px;\n    background:rgba(0,24,88,.08); overflow:hidden; position:relative;\n  }\n  .meter .fill{\n    position:absolute; left:0; top:0; bottom:0; width:0%;\n    background:linear-gradient(90deg, var(--pink-soft), var(--pink), var(--pink-deep));\n    border-radius:999px; transition:width .08s linear;\n  }\n  .meter .thresh{\n    position:absolute; top:-6px; bottom:-6px; left:22%; width:3px;\n    background:var(--blue); opacity:.45; border-radius:2px;\n  }\n  .mic-hint{ font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:34px; color:var(--pink-deep); }\n  .blowing .meter .fill{ box-shadow:0 0 18px rgba(238,90,152,.6); }\n\n  /* ---------- selfie camera ---------- */\n  #selfie{\n    position:absolute; left:50%; top:372px; transform:translateX(-50%);\n    width:384px; height:384px; border-radius:40px;\n    overflow:hidden; z-index:4;\n    box-shadow:0 18px 44px rgba(0,24,88,.20), 0 0 0 10px #fff, 0 0 0 14px var(--pink-soft);\n    background:#0b0b10;\n    opacity:0; transform:translateX(-50%) scale(.6); pointer-events:none;\n    transition:opacity .5s ease, transform .5s cubic-bezier(.2,.8,.3,1.2);\n  }\n  #selfie.show{ opacity:1; transform:translateX(-50%) scale(1); }\n  #selfie video{ width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }\n  #selfie .live{\n    position:absolute; left:50%; bottom:18px; transform:translateX(-50%);\n    display:flex; align-items:center; gap:9px;\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:26px; color:#fff;\n    background:rgba(0,24,88,.55); padding:5px 16px; border-radius:999px;\n    backdrop-filter:blur(4px);\n  }\n  #selfie .live .dot{ width:11px; height:11px; border-radius:50%; background:#FF5A5A; box-shadow:0 0 10px #FF5A5A; animation:pulseDot 1.2s infinite; }\n  @keyframes pulseDot{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }\n  /* hand hint ring that glows when motion seen */\n  #selfie.motion{ box-shadow:0 18px 44px rgba(238,90,152,.45), 0 0 0 10px #fff, 0 0 0 16px var(--pink); }\n  #motionCanvas{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; left:-10px; top:-10px; }\n\n  /* spark when lighting a candle */\n  .spark{\n    position:absolute; left:50%; top:-40px; transform:translateX(-50%);\n    width:60px; height:60px; border-radius:50%; pointer-events:none;\n    background:radial-gradient(circle, #FFF4C2 0%, #FFC93C 40%, rgba(255,140,40,0) 70%);\n    animation:sparkPop .5s ease-out forwards;\n  }\n  @keyframes sparkPop{\n    0%{ opacity:0; transform:translateX(-50%) scale(.2); }\n    40%{ opacity:1; transform:translateX(-50%) scale(1.3); }\n    100%{ opacity:0; transform:translateX(-50%) scale(1.8); }\n  }\n\n  .hidden{ display:none !important; }\n\n  /* ---------- Celebration overlay ---------- */\n  #celebrate{\n    position:absolute; inset:0; display:flex; flex-direction:column;\n    align-items:center; justify-content:center; text-align:center;\n    padding:0 110px; gap:40px; z-index:10;\n    background:radial-gradient(85% 65% at 50% 42%, rgba(254,246,228,.985), rgba(254,246,228,.93));\n    opacity:0; pointer-events:none; transition:opacity .6s ease;\n  }\n  #celebrate.show{ opacity:1; pointer-events:auto; }\n  .cel-spark{ font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:60px; color:var(--pink-deep); }\n  .cel-title{\n    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-weight:700; letter-spacing:-1.5px;\n    font-size:104px; line-height:1.04; color:var(--blue);\n    text-wrap:balance;\n  }\n  .cel-emoji{ font-size:92px; letter-spacing:18px; }\n  .cel-sub{ font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:46px; color:var(--pink-deep); max-width:640px; }\n\n  /* confetti + floating hearts layers */\n  #fx{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:11; }\n  .confetti{ position:absolute; width:18px; height:26px; border-radius:3px; will-change:transform; }\n  .floatheart{ position:absolute; will-change:transform; }\n\n  @media (prefers-reduced-motion: reduce){\n    .flame .body,.flame .core{ animation:none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div id=\"stage\">\n    <div id=\"canvas\" data-screen-label=\"Bolo 20K\">\n\n      <div class=\"blob b1\"><\u002Fdiv>\n      <div class=\"blob b2\"><\u002Fdiv>\n      <div class=\"blob b3\"><\u002Fdiv>\n      <div class=\"bg-hearts\" id=\"bgHearts\"><\u002Fdiv>\n\n      <div id=\"selfie\">\n        <video id=\"cam\" autoplay=\"\" playsinline=\"\" muted=\"\"><\u002Fvideo>\n        <div class=\"live\"><span class=\"dot\"><\u002Fspan> AO VIVO<\u002Fdiv>\n      <\u002Fdiv>\n      <canvas id=\"motionCanvas\" width=\"96\" height=\"72\"><\u002Fcanvas>\n\n      <div class=\"kicker\">✦ celebrando juntos ✦<\u002Fdiv>\n      <div class=\"headline\">20K<small>seguidores<\u002Fsmall><\u002Fdiv>\n\n      <!-- CAKE -->\n      <div id=\"cakeWrap\">\n        <div class=\"plate\"><\u002Fdiv>\n\n        <div class=\"cake-body\">\n          <div class=\"cake-top\">\n            <div class=\"top-hearts\" id=\"topHearts\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"icing\">20K seguidores<span class=\"small\">obrigada ☕💻💙<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- candles forming 20 -->\n        <div class=\"candles\">\n          <div class=\"candle c2\" data-candle=\"0\">\n            <svg viewBox=\"0 0 130 200\" aria-hidden=\"true\">\n              <path class=\"cdigit\" d=\"M30 62 C30 26 100 24 100 60 C100 92 38 128 32 168 L104 168\" fill=\"none\" stroke=\"#F582AE\" stroke-width=\"30\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <path class=\"cstripe\" d=\"M30 62 C30 26 100 24 100 60 C100 92 38 128 32 168 L104 168\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"30\" stroke-linecap=\"round\" stroke-dasharray=\"5 26\" opacity=\"0.55\"><\u002Fpath>\n            <\u002Fsvg>\n            <div class=\"wick\"><\u002Fdiv>\n            <div class=\"flame\" data-flame=\"0\"><div class=\"body\"><\u002Fdiv><div class=\"core\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"candle c0\" data-candle=\"1\">\n            <svg viewBox=\"0 0 130 200\" aria-hidden=\"true\">\n              <ellipse class=\"cdigit\" cx=\"65\" cy=\"105\" rx=\"42\" ry=\"80\" fill=\"none\" stroke=\"#F582AE\" stroke-width=\"30\"><\u002Fellipse>\n              <ellipse class=\"cstripe\" cx=\"65\" cy=\"105\" rx=\"42\" ry=\"80\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"30\" stroke-dasharray=\"5 26\" opacity=\"0.55\"><\u002Fellipse>\n            <\u002Fsvg>\n            <div class=\"wick\"><\u002Fdiv>\n            <div class=\"flame\" data-flame=\"1\"><div class=\"body\"><\u002Fdiv><div class=\"core\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HUD -->\n      <div class=\"hud\" id=\"hud\">\n        <!-- intro -->\n        <div id=\"introBox\">\n          <div class=\"instruction\">Ligue a câmera, <span class=\"pink\">aponte o dedo<\u002Fspan> pra acender e <span class=\"pink\">sopre<\u002Fspan> 🎂<\u002Fdiv>\n          <button class=\"btn\" id=\"micBtn\"><span>📷<\u002Fspan> Permitir câmera e microfone<\u002Fbutton>\n          <div style=\"margin-top:18px\"><button class=\"btn ghost\" id=\"tapBtn\">…ou faça tudo só tocando na tela<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- lighting (wave hand) -->\n        <div id=\"lightBox\" class=\"hidden\">\n          <div class=\"instruction\">☝️ Aponte o <span class=\"pink\">dedo<\u002Fspan> pra câmera pra acender as velas 🔥<\u002Fdiv>\n          <div class=\"mic-hint\" id=\"lightHint\">carregando detector de dedo… ⏳<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- blowing -->\n        <div id=\"blowBox\" class=\"hidden\">\n          <div class=\"instruction\">Faça um pedido e <span class=\"pink\">sopre<\u002Fspan> no microfone 🌬️<\u002Fdiv>\n          <div class=\"mic-row\">\n            <div class=\"meter\"><div class=\"fill\" id=\"meterFill\"><\u002Fdiv><div class=\"thresh\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"mic-hint\" id=\"micHint\">ouvindo… sopre forte!<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CELEBRATION -->\n      <div id=\"celebrate\">\n        <div class=\"cel-spark\">✨ e apagou! ✨<\u002Fdiv>\n        <div class=\"cel-title\">Obrigada pelos<br>20K seguidores!<\u002Fdiv>\n        <div class=\"cel-emoji\">☕💻💙<\u002Fdiv>\n        <div class=\"cel-sub\">vocês fazem parte de cada xícara de café e cada linha de código 💜<\u002Fdiv>\n        <button class=\"btn ghost\" id=\"resetBtn\" style=\"margin-top:10px\">🔁 acender de novo<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div id=\"fx\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n(function () {\n  'use strict';\n\n  /* ---------------- scaling ---------------- */\n  var canvas = document.getElementById('canvas');\n  function fit() {\n    var s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);\n    canvas.style.transform = 'scale(' + s + ')';\n  }\n  window.addEventListener('resize', fit);\n  fit();\n\n  /* ---------------- decorative hearts ---------------- */\n  function heartSVG(size, color, op) {\n    return '<svg width=\"' + size + '\" height=\"' + size + '\" viewBox=\"0 0 32 32\" style=\"opacity:' + op + '\">' +\n      '<path fill=\"' + color + '\" d=\"M16 28C16 28 3 20 3 11.5C3 7 6.5 4 10.3 4C12.8 4 15 5.4 16 7.6C17 5.4 19.2 4 21.7 4C25.5 4 29 7 29 11.5C29 20 16 28 16 28Z\"/><\u002Fsvg>';\n  }\n\n  var bg = document.getElementById('bgHearts');\n  var bgPositions = [\n    [120, 360, 34], [930, 300, 26], [200, 1180, 30], [880, 1320, 40],\n    [110, 760, 22], [960, 980, 24], [520, 250, 20], [300, 1500, 28],\n    [820, 1620, 22], [150, 1010, 26]\n  ];\n  bgPositions.forEach(function (p) {\n    var d = document.createElement('div');\n    d.className = 'h';\n    d.style.left = p[0] + 'px';\n    d.style.top = p[1] + 'px';\n    d.innerHTML = heartSVG(p[2], '#F582AE', 0.4);\n    bg.appendChild(d);\n  });\n\n  var topH = document.getElementById('topHearts');\n  var topPositions = [\n    [40, 36, 26], [120, 18, 20], [210, 40, 30], [300, 16, 22],\n    [380, 38, 26], [460, 22, 20], [165, 48, 18], [340, 50, 18]\n  ];\n  topPositions.forEach(function (p) {\n    var d = document.createElement('div');\n    d.style.position = 'absolute';\n    d.style.left = p[0] + 'px';\n    d.style.top = p[1] + 'px';\n    d.innerHTML = heartSVG(p[2], '#F582AE', 1);\n    topH.appendChild(d);\n  });\n\n  /* ---------------- elements ---------------- */\n  var flames = Array.prototype.slice.call(document.querySelectorAll('.flame'));\n  var candleEls = Array.prototype.slice.call(document.querySelectorAll('.candle'));\n  var cakeWrap = document.getElementById('cakeWrap');\n  var introBox = document.getElementById('introBox');\n  var lightBox = document.getElementById('lightBox');\n  var blowBox = document.getElementById('blowBox');\n  var micBtn = document.getElementById('micBtn');\n  var tapBtn = document.getElementById('tapBtn');\n  var resetBtn = document.getElementById('resetBtn');\n  var meterFill = document.getElementById('meterFill');\n  var micHint = document.getElementById('micHint');\n  var lightHint = document.getElementById('lightHint');\n  var celebrate = document.getElementById('celebrate');\n  var fx = document.getElementById('fx');\n  var selfie = document.getElementById('selfie');\n  var cam = document.getElementById('cam');\n\n  // per-candle state: 'unlit' | 'lit' | 'out'\n  var state = ['unlit', 'unlit'];\n  var life = [1, 1];\n  var blowReady = false;\n  var done = false;\n  var audioCtx = null, analyser = null, mediaStream = null, rafId = null, dataArr = null, freqArr = null;\n  var camStream = null, motionRaf = null, lastLightAt = 0;\n  var handModel = null, detecting = false, fingerStreak = 0, noHandStreak = 0;\n  var mctx = document.getElementById('motionCanvas').getContext('2d', { willReadFrequently: true });\n\n  function renderFlames() {\n    flames.forEach(function (f, i) {\n      f.classList.remove('weak', 'out');\n      if (state[i] === 'unlit' || state[i] === 'out') {\n        f.classList.add('out');\n        f.style.transform = '';\n        f.style.opacity = '0';        // JS-driven so it never depends on a CSS transition\n      } else {\n        f.style.opacity = '1';\n        if (life[i] < 0.5) f.classList.add('weak');\n      }\n    });\n  }\n\n  function lightCandle(i) {\n    if (state[i] !== 'unlit') return;\n    state[i] = 'lit';\n    life[i] = 1;\n    renderFlames();\n    // pop-in (Web Animations works even when CSS transitions are throttled)\n    try {\n      flames[i].animate(\n        [{ opacity: 0, transform: 'translateX(-50%) scale(.3)' },\n         { opacity: 1, transform: 'translateX(-50%) scale(1)' }],\n        { duration: 260, easing: 'cubic-bezier(.2,.8,.3,1.3)' }\n      );\n    } catch (e) {}\n    var sp = document.createElement('div');\n    sp.className = 'spark';\n    flames[i].parentNode.appendChild(sp);\n    setTimeout(function () { sp.remove(); }, 520);\n    checkLit();\n  }\n\n  function checkLit() {\n    if (state[0] === 'lit' && state[1] === 'lit' && !blowReady) {\n      blowReady = true;\n      lightBox.classList.add('hidden');\n      if (mediaStream) blowBox.classList.remove('hidden');\n      // safety net: let lit flames be tapped to blow out, in case the mic is weak\n      candleEls.forEach(function (c) {\n        c.style.cursor = 'pointer';\n        c.title = 'tocar pra apagar';\n        c.addEventListener('click', function () {\n          var idx = parseInt(c.getAttribute('data-candle'), 10);\n          if (state[idx] === 'lit') {\n            cakeWrap.classList.add('shake');\n            setTimeout(function () { cakeWrap.classList.remove('shake'); }, 480);\n            extinguish(idx);\n          }\n        });\n      });\n      if (micHint) micHint.textContent = 'sopre forte… (ou toque nas chamas) 🌬️';\n    }\n  }\n\n  function extinguish(i) {\n    if (state[i] !== 'lit') return;\n    state[i] = 'out';\n    life[i] = 0;\n    // puff-out via Web Animations (reliable even when CSS transitions are paused)\n    try {\n      flames[i].animate(\n        [{ opacity: 1, transform: 'translateX(-50%) scale(1)' },\n         { opacity: 0, transform: 'translateX(-50%) scale(.2) translateY(10px)' }],\n        { duration: 360, easing: 'ease', fill: 'forwards' }\n      );\n    } catch (e) {}\n    flames[i].style.transform = '';\n    renderFlames();\n    var smoke = document.createElement('div');\n    smoke.className = 'smoke';\n    flames[i].parentNode.appendChild(smoke);\n    setTimeout(function () { smoke.remove(); }, 1500);\n    checkDone();\n  }\n\n  function checkDone() {\n    if (done) return;\n    if (state[0] === 'out' && state[1] === 'out') {\n      done = true;\n      setTimeout(celebrateNow, 650);\n    }\n  }\n\n  function applyBlow(strength) {\n    cakeWrap.classList.add('shake');\n    setTimeout(function () { cakeWrap.classList.remove('shake'); }, 480);\n    for (var i = 0; i < 2; i++) {\n      if (state[i] === 'lit') {\n        life[i] -= strength * 0.10;\n        if (life[i] <= 0) { life[i] = 0; extinguish(i); }\n      }\n    }\n    renderFlames();\n  }\n\n  var blowFrames = 0;\n  function loop() {\n    rafId = requestAnimationFrame(loop);\n    if (!analyser) return;\n\n    // time-domain RMS\n    analyser.getByteTimeDomainData(dataArr);\n    var sum = 0;\n    for (var i = 0; i < dataArr.length; i++) {\n      var v = (dataArr[i] - 128) / 128;\n      sum += v * v;\n    }\n    var rms = Math.sqrt(sum / dataArr.length);\n\n    // low-frequency band energy — a real blow dumps lots of energy into the lows\n    analyser.getByteFrequencyData(freqArr);\n    var lowSum = 0, lowN = Math.min(24, freqArr.length);\n    for (var k = 0; k < lowN; k++) lowSum += freqArr[k];\n    var lowAvg = (lowSum / lowN) / 255; // 0..1\n\n    // combine: whichever signals a blow more strongly\n    var level = Math.min(1, Math.max(rms * 3.2, lowAvg * 1.4));\n    meterFill.style.width = (level * 100) + '%';\n\n    var THRESH = 0.22;\n    if (level > THRESH && !done && blowReady) {\n      blowFrames++;\n      blowBox.parentNode.classList.add('blowing');\n      flames.forEach(function (f, i) {\n        if (state[i] === 'lit') {\n          f.style.transform = 'translateX(-50%) rotate(' + (16 + Math.random() * 14) + 'deg) scale(' + (1 - life[i] * 0.12) + ')';\n        }\n      });\n      if (blowFrames >= 2) {\n        // fixed, strong drain so a normal blow puts them out in ~0.8s\n        applyBlow(0.16 + (level - THRESH) * 0.5);\n      }\n      micHint.textContent = 'isso! continua soprando 🌬️';\n    } else {\n      blowFrames = 0;\n      blowBox.parentNode.classList.remove('blowing');\n      flames.forEach(function (f, i) { if (state[i] === 'lit') f.style.transform = ''; });\n    }\n  }\n\n  function startMedia() {\n    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {\n      fallbackTap('Seu navegador não permite câmera aqui — vamos no toque 👆');\n      return;\n    }\n    micBtn.disabled = true;\n    micBtn.innerHTML = '<span>⏳<\u002Fspan> pedindo acesso…';\n    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true }).then(function (stream) {\n      mediaStream = stream;\n      camStream = stream;\n      cam.srcObject = stream;\n      selfie.classList.add('show');\n      try {\n        audioCtx = new (window.AudioContext || window.webkitAudioContext)();\n        var src = audioCtx.createMediaStreamSource(stream);\n        analyser = audioCtx.createAnalyser();\n        analyser.fftSize = 1024;\n        dataArr = new Uint8Array(analyser.fftSize);\n        freqArr = new Uint8Array(analyser.frequencyBinCount);\n        src.connect(analyser);\n      } catch (e) {}\n      introBox.classList.add('hidden');\n      lightBox.classList.remove('hidden');\n      loop();\n      enableTap();   // safety net: candles are also tappable if detection is finicky\n      startHandDetection();\n    }).catch(function () {\n      fallbackTap('Sem acesso à câmera/microfone — sem problema, toque na tela 👆');\n    });\n  }\n\n  // ---- finger/hand detection via TensorFlow.js handpose ----\n  function startHandDetection() {\n    if (typeof handpose === 'undefined') {\n      if (lightHint) lightHint.innerHTML = 'detector indisponível — <span class=\"pink\">toque nas velas<\u002Fspan> pra acender 👆';\n      return;\n    }\n    if (lightHint) lightHint.textContent = 'carregando detector de dedo… ⏳';\n    handpose.load({ detectionConfidence: 0.8 }).then(function (model) {\n      handModel = model;\n      if (lightHint && !blowReady) lightHint.innerHTML = '☝️ <span class=\"pink\">aponte o dedo<\u002Fspan> pra câmera pra acender';\n      detectLoop();\n    }).catch(function () {\n      if (lightHint) lightHint.innerHTML = 'detector falhou — <span class=\"pink\">toque nas velas<\u002Fspan> pra acender 👆';\n    });\n  }\n\n  // distance in the image plane\n  function d2(a, b) { var dx = a[0] - b[0], dy = a[1] - b[1]; return Math.sqrt(dx * dx + dy * dy); }\n\n  // a finger counts as \"extended\" when its tip is clearly farther from the wrist than its lower joint\n  function isExtended(ann, wrist) {\n    var pts = ann; // [mcp, pip, dip, tip]\n    return d2(wrist, pts[3]) > d2(wrist, pts[1]) * 1.15;\n  }\n\n  function detectLoop() {\n    if (!camStream || !handModel) return;\n    if (blowReady) return; // stop once both candles are lit\n    if (cam.readyState < 2) { motionRaf = requestAnimationFrame(detectLoop); return; }\n    if (detecting) { motionRaf = requestAnimationFrame(detectLoop); return; }\n    detecting = true;\n    handModel.estimateHands(cam, true).then(function (hands) {\n      detecting = false;\n      var showingFinger = false;\n      if (hands && hands.length && hands[0].handInViewConfidence > 0.9) {\n        var ann = hands[0].annotations;\n        var wrist = ann.palmBase[0];\n        // \"showing a finger\" = index finger extended (covers pointing / number-1 gesture)\n        if (isExtended(ann.indexFinger, wrist)) showingFinger = true;\n      }\n      selfie.classList.toggle('motion', showingFinger);\n\n      if (showingFinger) { fingerStreak++; noHandStreak = 0; }\n      else { fingerStreak = 0; noHandStreak++; }\n\n      // need the finger held for 2 detections in a row (~0.5s) so a passing hand won't trigger\n      if (fingerStreak >= 2 && !blowReady && Date.now() - lastLightAt > 900) {\n        if (state[0] === 'unlit') {\n          lightCandle(0); lastLightAt = Date.now(); fingerStreak = 0;\n          if (lightHint) lightHint.innerHTML = 'acendeu uma! ☝️ <span class=\"pink\">mostre o dedo<\u002Fspan> de novo';\n        } else if (state[1] === 'unlit') {\n          lightCandle(1); lastLightAt = Date.now(); fingerStreak = 0;\n        }\n      }\n      motionRaf = requestAnimationFrame(detectLoop);\n    }).catch(function () {\n      detecting = false;\n      motionRaf = requestAnimationFrame(detectLoop);\n    });\n  }\n\n  function fallbackTap(msg) {\n    introBox.classList.add('hidden');\n    blowBox.classList.add('hidden');\n    var hud = document.getElementById('hud');\n    var note = document.createElement('div');\n    note.className = 'instruction';\n    note.innerHTML = msg + '<br><span class=\"pink\">toque em cada velinha<\u002Fspan> 👆';\n    hud.innerHTML = '';\n    hud.appendChild(note);\n    enableTap();\n  }\n\n  function enableTap() {\n    candleEls.forEach(function (c) {\n      c.style.cursor = 'pointer';\n      c.addEventListener('click', function () {\n        var idx = parseInt(c.getAttribute('data-candle'), 10);\n        cakeWrap.classList.add('shake');\n        setTimeout(function () { cakeWrap.classList.remove('shake'); }, 480);\n        if (state[idx] === 'unlit') lightCandle(idx);\n        else extinguish(idx);\n      });\n    });\n  }\n\n  function celebrateNow() {\n    analyser = null;\n    if (rafId) cancelAnimationFrame(rafId);\n    if (motionRaf) cancelAnimationFrame(motionRaf);\n    camStream = null;\n    if (mediaStream) mediaStream.getTracks().forEach(function (t) { t.stop(); });\n    if (audioCtx) { try { audioCtx.close(); } catch (e) {} }\n    selfie.classList.remove('show');\n    celebrate.classList.add('show');\n    burst();\n  }\n\n  function burst() {\n    var colors = ['#F582AE', '#001858', '#FFC93C', '#FBC7DD', '#FEF6E4'];\n    for (var i = 0; i < 90; i++) {\n      (function (i) {\n        var c = document.createElement('div');\n        c.className = 'confetti';\n        var x = Math.random() * 1080;\n        c.style.left = x + 'px';\n        c.style.top = '-40px';\n        c.style.background = colors[i % colors.length];\n        c.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';\n        if (Math.random() < 0.4) c.style.borderRadius = '50%';\n        fx.appendChild(c);\n        var dur = 2600 + Math.random() * 2200;\n        var drift = (Math.random() - 0.5) * 360;\n        var rot = (Math.random() - 0.5) * 1080;\n        c.animate([\n          { transform: c.style.transform + ' translate(0,0)', opacity: 1 },\n          { transform: 'translate(' + drift + 'px,' + (2050) + 'px) rotate(' + rot + 'deg)', opacity: 1 }\n        ], { duration: dur, delay: Math.random() * 700, easing: 'cubic-bezier(.2,.6,.4,1)', fill: 'forwards' });\n        setTimeout(function () { c.remove(); }, dur + 900);\n      })(i);\n    }\n    for (var j = 0; j < 22; j++) {\n      (function (j) {\n        var h = document.createElement('div');\n        h.className = 'floatheart';\n        var size = 28 + Math.random() * 46;\n        h.style.left = (Math.random() * 1000 + 40) + 'px';\n        h.style.top = '1980px';\n        h.innerHTML = heartSVG(size, Math.random() < 0.5 ? '#F582AE' : '#EE5A98', 0.9);\n        fx.appendChild(h);\n        var dur = 4200 + Math.random() * 2600;\n        var sway = (Math.random() - 0.5) * 160;\n        h.animate([\n          { transform: 'translate(0,0) scale(.6)', opacity: 0 },\n          { transform: 'translate(' + (sway * 0.5) + 'px,-300px) scale(1)', opacity: 1, offset: 0.2 },\n          { transform: 'translate(' + sway + 'px,-2100px) scale(1)', opacity: 0 }\n        ], { duration: dur, delay: Math.random() * 1400, easing: 'ease-out', fill: 'forwards' });\n        setTimeout(function () { h.remove(); }, dur + 1600);\n      })(j);\n    }\n  }\n\n  function reset() {\n    location.reload();\n  }\n\n  micBtn.addEventListener('click', startMedia);\n  tapBtn.addEventListener('click', function () {\n    introBox.classList.add('hidden');\n    lightBox.classList.add('hidden');\n    blowBox.classList.add('hidden');\n    var hud = document.getElementById('hud');\n    var note = document.createElement('div');\n    note.className = 'instruction';\n    note.innerHTML = '<span class=\"pink\">Toque em cada velinha<\u002Fspan> pra acender 🔥 — depois toque de novo pra apagar 🌬️';\n    hud.innerHTML = '';\n    hud.appendChild(note);\n    enableTap();\n  });\n  resetBtn.addEventListener('click', reset);\n\n  renderFlames();\n})();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
